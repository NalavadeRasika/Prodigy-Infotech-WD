<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Tic Tac Toe</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #141e30, #243b55);
  color:#fff;
}

.container{
  text-align:center;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

h1{
  margin-bottom:15px;
  font-size:2.2rem;
  letter-spacing:1px;
}

.mode-buttons button{
  margin:5px;
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:#fff;
  font-weight:bold;
  transition:0.3s;
}

.mode-buttons button:hover{
  transform:scale(1.1);
}

.board{
  display:grid;
  grid-template-columns:repeat(3,100px);
  gap:12px;
  margin:20px auto;
}

.cell{
  width:100px;
  height:100px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:2.5rem;
  border-radius:15px;
  cursor:pointer;
  background:rgba(255,255,255,0.1);
  box-shadow: inset 0 0 15px rgba(255,255,255,0.2), 0 10px 25px rgba(0,0,0,0.5);
  transition:all 0.3s ease;
}

.cell:hover{
  transform:scale(1.1) rotate(3deg);
  background:rgba(255,255,255,0.2);
}

.cell.X{
  color:#00ffd5;
  text-shadow:0 0 15px #00ffd5;
}

.cell.O{
  color:#ff4d6d;
  text-shadow:0 0 15px #ff4d6d;
}

.status{
  margin-top:10px;
  font-size:1.2rem;
}

.controls button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.controls button:hover{
  transform:scale(1.1);
}

.win{
  animation:glow 1s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px #fff}
  to{box-shadow:0 0 30px #00ffd5}
}

</style>
</head>

<body>
<div class="container">
  <h1>✨ Tic Tac Toe ✨</h1>

  <div class="mode-buttons">
    <button onclick="setMode('pvp')">👥 2 Player</button>
    <button onclick="setMode('ai')">🤖 AI Mode</button>
  </div>

  <div class="board" id="board"></div>

  <div class="status" id="status">Player X's Turn</div>

  <div class="controls">
    <button onclick="resetGame()">🔄 Reset</button>
  </div>
</div>

<script>
let board=Array(9).fill("");
let currentPlayer="X";
let gameActive=true;
let mode="pvp";

const winConditions=[
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

const boardEl=document.getElementById("board");
const statusEl=document.getElementById("status");

function createBoard(){
  boardEl.innerHTML="";
  board.forEach((_,i)=>{
    const cell=document.createElement("div");
    cell.classList.add("cell");
    cell.addEventListener("click",()=>handleClick(i));
    boardEl.appendChild(cell);
  });
}

function handleClick(i){
  if(board[i]!==""||!gameActive) return;

  board[i]=currentPlayer;
  render();

  if(checkWinner()){
    statusEl.textContent=`Player ${currentPlayer} Wins! 🎉`;
    highlightWin();
    gameActive=false;
    return;
  }

  if(!board.includes("")){
    statusEl.textContent="It's a Draw!";
    gameActive=false;
    return;
  }

  currentPlayer=currentPlayer==="X"?"O":"X";
  statusEl.textContent=`Player ${currentPlayer}'s Turn`;

  if(mode==="ai"&&currentPlayer==="O"){
    setTimeout(aiMove,500);
  }
}

function render(){
  document.querySelectorAll(".cell").forEach((cell,i)=>{
    cell.textContent=board[i];
    cell.classList.remove("X","O");
    if(board[i]) cell.classList.add(board[i]);
  });
}

function checkWinner(){
  return winConditions.some(([a,b,c])=>
    board[a]&&board[a]===board[b]&&board[a]===board[c]
  );
}

function highlightWin(){
  winConditions.forEach(([a,b,c])=>{
    if(board[a]&&board[a]===board[b]&&board[a]===board[c]){
      const cells=document.querySelectorAll(".cell");
      cells[a].classList.add("win");
      cells[b].classList.add("win");
      cells[c].classList.add("win");
    }
  });
}

function aiMove(){
  let empty=board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
  let move=empty[Math.floor(Math.random()*empty.length)];
  handleClick(move);
}

function resetGame(){
  board=Array(9).fill("");
  currentPlayer="X";
  gameActive=true;
  statusEl.textContent="Player X's Turn";
  createBoard();
}

function setMode(m){
  mode=m;
  resetGame();
}

createBoard();
</script>
</body>
</html>
