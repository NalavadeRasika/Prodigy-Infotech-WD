<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylish Stopwatch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      width: 320px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .time {
      font-size: 2.5rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .buttons button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .start { background: #28a745; color: white; }
    .pause { background: #ffc107; color: black; }
    .reset { background: #dc3545; color: white; }
    .lap { background: #17a2b8; color: white; }

    button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .laps {
      margin-top: 20px;
      max-height: 150px;
      overflow-y: auto;
      text-align: left;
    }

    .laps li {
      list-style: none;
      padding: 5px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>⏱ Stopwatch</h1>
    <div class="time" id="display">00:00:00</div>

    <div class="buttons">
      <button class="start" onclick="startTimer()">Start</button>
      <button class="pause" onclick="pauseTimer()">Pause</button>
      <button class="lap" onclick="recordLap()">Lap</button>
      <button class="reset" onclick="resetTimer()">Reset</button>
    </div>

    <ul class="laps" id="laps"></ul>
  </div>

  <script>
    let timer;
    let seconds = 0;
    let isRunning = false;

    function updateDisplay() {
      let hrs = Math.floor(seconds / 3600);
      let mins = Math.floor((seconds % 3600) / 60);
      let secs = seconds % 60;

      document.getElementById('display').innerText =
        `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function startTimer() {
      if (!isRunning) {
        isRunning = true;
        timer = setInterval(() => {
          seconds++;
          updateDisplay();
        }, 1000);
      }
    }

    function pauseTimer() {
      clearInterval(timer);
      isRunning = false;
    }

    function resetTimer() {
      clearInterval(timer);
      seconds = 0;
      isRunning = false;
      updateDisplay();
      document.getElementById('laps').innerHTML = '';
    }

    function recordLap() {
      if (seconds === 0) return;

      const lapTime = document.getElementById('display').innerText;
      const li = document.createElement('li');
      li.textContent = `Lap ${document.getElementById('laps').children.length + 1}: ${lapTime}`;
      document.getElementById('laps').appendChild(li);
    }
  </script>

</body>
</html>
